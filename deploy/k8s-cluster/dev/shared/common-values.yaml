# Common values for both Terraform and Helm - SINGLE SOURCE OF TRUTH
namespace: "default-apps"

cluster:
  name: "dev-cluster"
  ports:
    grafana: 30080
    influxdb: 30300

# Helm app configurations (non-version settings)
apps:
  influxdb:
    storage: "10Gi"
  grafana:
    storage: "5Gi"
    adminPassword: "admin"
  database:
    name: "telegraf"