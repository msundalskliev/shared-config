apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-management-api
  namespace: default-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-management-api
  template:
    metadata:
      labels:
        app: k8s-management-api
    spec:
      serviceAccountName: k8s-management-api
      containers:
      - name: api
        image: k8s-management-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
