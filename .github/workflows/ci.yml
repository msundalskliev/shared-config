name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate YAML
        run: |
          pip install pyyaml
          python3 -c "
          import yaml, glob, sys
          files = glob.glob('**/*.yaml', recursive=True) + glob.glob('**/*.yml', recursive=True)
          errors = []
          for f in files:
              try:
                  list(yaml.safe_load_all(open(f)))
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'Validated {len(files)} YAML files')
          "
